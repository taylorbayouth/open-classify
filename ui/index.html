<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Classify · Live workbench</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="head">
        <div class="head-row">
          <span class="live-dot" id="liveDot" data-state="idle" aria-hidden="true"></span>
          <h1>Open Classify</h1>
          <span class="badge" id="runState" data-state="idle">Idle</span>
        </div>
        <div class="breadcrumb" id="phaseTrail" hidden></div>
      </header>

      <div class="grid">
        <aside>
          <form class="panel msg-panel" id="classifyForm">
            <div class="msg-panel-head">
              <span class="label">Message history</span>
              <div class="btn-row">
                <button class="btn" type="button" id="sampleButton">Random sample</button>
                <button class="btn" type="button" id="addMessageButton">Add message</button>
              </div>
            </div>

            <div class="message-list" id="messageList"></div>

            <div class="cta-row">
              <button class="btn-primary" type="submit" id="runButton">Run classifiers</button>
              <button class="btn btn-ghost" type="button" id="clearButton">Clear</button>
            </div>

            <details class="event-log" id="eventLogDetails">
              <summary>
                <span class="label">Event log</span>
                <div>
                  <span class="count" id="eventLogCount">0 events</span>
                  <span class="chev">▸</span>
                </div>
              </summary>
              <ol class="event-log-list" id="eventLogList"></ol>
            </details>
          </form>
        </aside>

        <section class="right">
          <section class="final-output" id="aggregatePanel" hidden></section>

          <div class="cards-masonry" id="classifierGrid"></div>

          <details class="json-toggle panel" id="jsonToggle" hidden>
            <summary>
              <span>Raw pipeline JSON</span>
              <button type="button" class="btn" id="copyJsonButton">Copy</button>
            </summary>
            <pre class="json-panel" id="jsonPanel"></pre>
          </details>
        </section>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
