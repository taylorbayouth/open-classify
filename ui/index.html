<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Classify · Live workbench</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-row">
            <span class="logo-dot" id="liveDot" data-state="idle"></span>
            <h1>Open Classify</h1>
            <span class="run-state" id="runState" data-state="idle">Idle</span>
          </div>
          <div class="phase-trail" id="phaseTrail" hidden></div>
          <div class="meta-chips" id="metaChips"></div>
        </div>
        <div class="awk-display" id="awkDisplay" hidden>
          <span class="awk-label">response</span>
          <strong id="awkValue">—</strong>
        </div>
      </header>

      <section class="workspace">
        <form class="composer" id="classifyForm">
          <section class="conversation-editor">
            <header class="section-head">
              <span>Conversation window</span>
              <button class="secondary compact" type="button" id="addMessageButton">Add message</button>
            </header>
            <div class="message-list" id="messageList"></div>
          </section>

          <details class="field-details">
            <summary>Request metadata</summary>
            <div class="field-grid">
              <label class="field">
                <span>Source</span>
                <input name="source" placeholder="api" />
              </label>
              <label class="field">
                <span>External request ID</span>
                <input name="external_request_id" placeholder="delivery-123" />
              </label>
              <label class="field">
                <span>Conversation ID</span>
                <input name="conversation_id" placeholder="C123" />
              </label>
              <label class="field">
                <span>Thread ID</span>
                <input name="thread_id" placeholder="T123" />
              </label>
              <label class="field">
                <span>Window note</span>
                <input name="window_note" placeholder="Messages are entered oldest to newest" disabled />
              </label>
            </div>
          </details>

          <label class="file-drop" for="attachmentInput">
            <input id="attachmentInput" type="file" multiple />
            <span>Attachments</span>
            <small>Metadata only · click to choose</small>
          </label>
          <div class="attachment-list" id="attachmentList"></div>

          <div class="actions">
            <button class="primary" type="submit" id="runButton">
              <span class="btn-label">Run classifiers</span>
            </button>
            <button class="secondary" type="button" id="clearButton">Clear</button>
          </div>

          <section class="event-log">
            <header>
              <span>Event log</span>
              <span class="event-log-count" id="eventLogCount">0 events</span>
            </header>
            <ol id="eventLogList"></ol>
          </section>
        </form>

        <section class="results">
          <div class="classifier-grid" id="classifierGrid"></div>

          <div class="hashes" id="hashes" hidden></div>

          <details class="json-toggle" id="jsonToggle">
            <summary>
              <span>Raw pipeline JSON</span>
              <button type="button" class="copy-json" id="copyJsonButton">Copy</button>
            </summary>
            <pre class="json-panel" id="jsonPanel"></pre>
          </details>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
